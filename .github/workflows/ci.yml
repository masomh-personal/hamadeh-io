name: CI

on:
    push:
        branches: [main, next-version]
    pull_request:
        branches: [main, next-version]

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"

            - name: Cache Bun packages
              uses: actions/cache@v6
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-cache-${{ hashFiles('**/bun.lock') }}

            - name: Install dependencies
              run: bun install --frozen-lockfile
              env:
                  HUSKY: 0

            # next-env.d.ts is gitignored; generate it and route types so type-check succeeds
            - name: Generate Next.js types
              run: bun run typegen

            - name: Healthcheck
              run: bun run healthcheck

            - name: Audit dependencies
              run: bun audit

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: check
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"

            - name: Cache Bun packages
              uses: actions/cache@v6
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-cache-${{ hashFiles('**/bun.lock') }}

            - name: Install dependencies
              run: bun install --frozen-lockfile
              env:
                  HUSKY: 0

            - name: Build
              run: bun run build
